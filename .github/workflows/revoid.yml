name: revoid review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9
      - run: bun install --frozen-lockfile
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ secrets.REVOID_APP_ID }}
          private-key: ${{ secrets.REVOID_APP_PRIVATE_KEY }}
      - name: revoid review
        env:
          # Create this repository secret with your opencode zen API key.
          REVOID_ZEN_API_KEY: ${{ secrets.REVOID_ZEN_API_KEY }}
          # gh reads GH_TOKEN automatically; the default token can comment on PRs.
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        # --no-context skips the read_file/grep tool loop: it multiplies the
        # reasoning model's per-call latency and pushes whole-PR reviews past the
        # timeout. The diff alone is enough for a CI gate.
        run: bun run src/cli.ts review --pr ${{ github.event.pull_request.number }} --no-context --comment
