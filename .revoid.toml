# revoid configuration for this repository (used by the CI review job).
# See `revoid config` for the full reference.

[guardrails]
# Raise the 120s default for local/manual runs on large diffs. Note the
# effective ceiling is the HTTP client's ~300s response timeout (undici), which
# this cannot extend; CI uses the faster zen/deepseek-v4-flash model to stay
# under it (see .github/workflows/revoid.yml).
# (maxOutputTokens is handled by the raised built-in default — see src/model.ts.)
timeoutMs = 300000
